# Local-build stack — builds the image from this source tree.
# `compose.yaml` is the auto-picked default (pulls the published image), so
# invoke this one explicitly:
#
#   docker compose -f docker-compose.yml up --build -d
#
# Or pull a published image here too by setting PINCHIVE_IMAGE in .env.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    # Pull the published image by setting PINCHIVE_IMAGE (e.g.
    #   PINCHIVE_IMAGE=ghcr.io/aroxu/pinchive:latest) then `docker compose up -d`,
    # or build locally with `docker compose up --build`.
    image: ${PINCHIVE_IMAGE:-pinchive:latest}
    build:
      context: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PINCHIVE_REDIS_URL: redis://redis:6379
      PINCHIVE_DATA_DIR: /data
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: ${PINCHIVE_IMAGE:-pinchive:latest}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PINCHIVE_REDIS_URL: redis://redis:6379
      PINCHIVE_DATA_DIR: /data
    command: ["arq", "app.tasks.WorkerSettings"]
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  redis-data:
