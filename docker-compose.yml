services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    # Pull a published variant by setting PINCHIVE_IMAGE (e.g.
    #   PINCHIVE_IMAGE=ghcr.io/aroxu/pinchive:playwright) then `docker compose up -d`.
    # Or build locally with `docker compose up --build` (INSTALL_PLAYWRIGHT toggles
    # the browser into the local build).
    image: ${PINCHIVE_IMAGE:-pinchive:latest}
    build:
      context: .
      args:
        INSTALL_PLAYWRIGHT: ${INSTALL_PLAYWRIGHT:-false}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PINCHIVE_REDIS_URL: redis://redis:6379
      PINCHIVE_DATA_DIR: /data
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: ${PINCHIVE_IMAGE:-pinchive:latest}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PINCHIVE_REDIS_URL: redis://redis:6379
      PINCHIVE_DATA_DIR: /data
    command: ["arq", "app.tasks.WorkerSettings"]
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  redis-data:
