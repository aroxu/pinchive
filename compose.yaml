# Default stack — runs the published multi-arch GHCR image (amd64 + arm64).
# This is the file `docker compose` picks up automatically, so:
#
#   cp .env.example .env          # optional: PINCHIVE_* overrides
#   docker compose up -d          # open http://localhost:8000
#
#   Pin a version:  PINCHIVE_TAG=v0.1.0 docker compose up -d
#   Update:         docker compose pull && docker compose up -d
#
# No checkout needed — grab just this file:
#   curl -fsSLO https://raw.githubusercontent.com/aroxu/pinchive/main/compose.yaml
#
# Data (db, boards, cookies) persists in ./data.
# To build from a source clone instead, use: docker compose -f docker-compose.yml up --build -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    image: ghcr.io/aroxu/pinchive:${PINCHIVE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-UTC}
      PINCHIVE_REDIS_URL: redis://redis:6379
      PINCHIVE_DATA_DIR: /data
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: ghcr.io/aroxu/pinchive:${PINCHIVE_TAG:-latest}
    restart: unless-stopped
    command: ["arq", "app.tasks.WorkerSettings"]
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-UTC}
      PINCHIVE_REDIS_URL: redis://redis:6379
      PINCHIVE_DATA_DIR: /data
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  redis-data:
